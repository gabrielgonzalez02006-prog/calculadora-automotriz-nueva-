<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoVision Elite | Inteligencia Automotriz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at top right, #1e293b, #020617);
            color: #f8fafc;
            min-height: 100vh;
        }
        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .car-card:hover {
            transform: translateY(-10px);
            border-color: #38bdf8;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.2);
        }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-7xl mx-auto">
        <header class="text-center mb-16">
            <h1 class="text-5xl md:text-7xl font-extrabold tracking-tighter mb-4 bg-clip-text text-transparent bg-gradient-to-r from-sky-400 to-indigo-500">
                AUTOVISION ELITE
            </h1>
            <p class="text-slate-400 text-lg font-light">La ingeniería financiera detrás de tu próximo motor.</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <div class="lg:col-span-2 space-y-6">
                <div class="glass p-6 rounded-3xl">
                    <input type="text" id="search" onkeyup="filterCars()" placeholder="Buscar modelo (Ej: Mustang, BMW, Swift...)" 
                           class="w-full bg-slate-900/50 border border-slate-700 p-4 rounded-2xl focus:outline-none focus:ring-2 focus:ring-sky-500 transition-all text-white">
                </div>

                <div id="catalog" class="grid grid-cols-1 md:grid-cols-2 gap-6 custom-scroll overflow-y-auto max-h-[600px] pr-2">
                    </div>
            </div>

            <div class="lg:col-span-1">
                <div class="glass p-8 rounded-3xl sticky top-10">
                    <h2 class="text-2xl font-bold mb-6 flex items-center gap-2">
                        <span class="w-2 h-8 bg-sky-500 rounded-full"></span>
                        Análisis de Coste
                    </h2>
                    
                    <div class="space-y-5">
                        <div>
                            <label class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Modelo Seleccionado</label>
                            <input type="text" id="calc-modelo" readonly class="w-full bg-transparent border-b border-slate-700 py-2 text-xl font-bold outline-none">
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="text-xs font-semibold text-slate-500 uppercase">Patente (UYU)</label>
                                <input type="number" id="calc-patente" class="w-full bg-slate-800/50 p-3 rounded-xl border border-slate-700 mt-1">
                            </div>
                            <div>
                                <label class="text-xs font-semibold text-slate-500 uppercase">Seguro (UYU)</label>
                                <input type="number" id="calc-seguro" class="w-full bg-slate-800/50 p-3 rounded-xl border border-slate-700 mt-1">
                            </div>
                        </div>
                        <div>
                            <label class="text-xs font-semibold text-slate-500 uppercase">Km Mensuales</label>
                            <input type="number" id="calc-km" value="1000" class="w-full bg-slate-800/50 p-3 rounded-xl border border-slate-700 mt-1">
                        </div>
                        
                        <button onclick="calculateTotal()" class="w-full bg-sky-500 hover:bg-sky-400 text-slate-950 font-bold py-4 rounded-2xl transition-all shadow-lg shadow-sky-500/20 active:scale-95">
                            GENERAR REPORTE
                        </button>

                        <div id="report" class="mt-8 p-6 bg-slate-900/80 rounded-2xl hidden border-l-4 border-green-500">
                            <p class="text-slate-400 text-sm">Gasto Mensual Total</p>
                            <div class="text-4xl font-black text-green-400" id="total-result">$ 0</div>
                            <p class="text-xs text-slate-500 mt-4 leading-relaxed">Incluye combustible (Nafta $78/L), seguro y tributos municipales prorrateados.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const cars = [
            { brand: "Ford", model: "Mustang GT", img: "https://images.unsplash.com/photo-1584345604480-8347bb9c503c?auto=format&fit=crop&q=80&w=400", consumption: 6, tax: 65000, insurance: 70000 },
            { brand: "BMW", model: "M3 Competition", img: "https://images.unsplash.com/photo-1555215695-3004980ad54e?auto=format&fit=crop&q=80&w=400", consumption: 8, tax: 85000, insurance: 95000 },
            { brand: "Volkswagen", model: "Vento TSI", img: "https://images.unsplash.com/photo-1622353320295-88849666014b?auto=format&fit=crop&q=80&w=400", consumption: 11, tax: 32000, insurance: 38000 },
            { brand: "Suzuki", model: "Swift Hybrid", img: "https://images.unsplash.com/photo-1632243193741-b30893698d91?auto=format&fit=crop&q=80&w=400", consumption: 18, tax: 19000, insurance: 22000 },
            { brand: "Porsche", model: "911 Carrera", img: "https://images.unsplash.com/photo-1503376780353-7e6692767b70?auto=format&fit=crop&q=80&w=400", consumption: 7, tax: 120000, insurance: 150000 },
            { brand: "Toyota", model: "Hilux SRX", img: "https://images.unsplash.com/photo-1591439657078-e045a94474b2?auto=format&fit=crop&q=80&w=400", consumption: 10, tax: 45000, insurance: 50000 }
        ];

        function loadCatalog(data) {
            const container = document.getElementById('catalog');
            container.innerHTML = data.map(car => `
                <div class="car-card glass rounded-3xl p-4 transition-all duration-300 cursor-pointer" onclick="selectCar('${car.model}', ${car.tax}, ${car.insurance}, ${car.consumption})">
                    <img src="${car.img}" class="w-full h-48 object-cover rounded-2xl mb-4" alt="${car.model}">
                    <h3 class="text-sm text-sky-400 font-bold uppercase tracking-widest">${car.brand}</h3>
                    <p class="text-xl font-bold text-white">${car.model}</p>
                    <div class="flex justify-between mt-4 text-xs text-slate-400">
                        <span>Consumo: ${car.consumption} km/L</span>
                        <span>UY Market</span>
                    </div>
                </div>
            `).join('');
        }

        function filterCars() {
            const query = document.getElementById('search').value.toLowerCase();
            const filtered = cars.filter(c => c.model.toLowerCase().includes(query) || c.brand.toLowerCase().includes(query));
            loadCatalog(filtered);
        }

        let selectedConsumption = 0;

        function selectCar(model, tax, insurance, cons) {
            document.getElementById('calc-modelo').value = model;
            document.getElementById('calc-patente').value = tax;
            document.getElementById('calc-seguro').value = insurance;
            selectedConsumption = cons;
            document.getElementById('report').classList.add('hidden');
        }

        function calculateTotal() {
            const tax = parseFloat(document.getElementById('calc-patente').value) || 0;
            const ins = parseFloat(document.getElementById('calc-seguro').value) || 0;
            const km = parseFloat(document.getElementById('calc-km').value) || 0;
            
            const fuelCost = (km / (selectedConsumption || 10)) * 78;
            const monthlyFixed = (tax + ins) / 12;
            const total = fuelCost + monthlyFixed;

            document.getElementById('total-result').innerText = `$ ${total.toLocaleString('es-UY', {maximumFractionDigits: 0})}`;
            document.getElementById('report').classList.remove('hidden');
        }

        loadCatalog(cars);
    </script>
</body>
</html>
