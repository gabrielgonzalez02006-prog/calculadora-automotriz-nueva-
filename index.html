<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoUY | Base de Datos Automotriz Uruguay</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f2ff; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #010409; color: #e6edf3; overflow-x: hidden; }
        
        /* Glassmorphism Pro */
        .glass { background: rgba(13, 17, 23, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        
        /* Efecto de Movimiento en Imágenes */
        .car-card { transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1); position: relative; overflow: hidden; }
        .car-card:hover { transform: translateY(-10px) scale(1.02); border-color: var(--neon); box-shadow: 0 0 30px rgba(0, 242, 255, 0.15); }
        .car-card img { transition: transform 0.8s ease; }
        .car-card:hover img { transform: scale(1.15) rotate(1deg); }
        
        /* Animación de entrada */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-card { animation: fadeIn 0.5s ease forwards; }

        input::-webkit-calendar-picker-indicator { filter: invert(1); }
        .neon-text { text-shadow: 0 0 10px rgba(0, 242, 255, 0.5); }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-7xl mx-auto">
        <header class="mb-16 flex flex-col md:flex-row justify-between items-center gap-6">
            <div class="text-center md:text-left">
                <h1 class="text-7xl font-black tracking-tighter text-white neon-text">Auto<span class="text-[#00f2ff]">UY</span></h1>
                <p class="text-slate-500 font-bold tracking-[0.2em] uppercase text-xs mt-2">Uruguay Automotive Intelligence</p>
            </div>
            <div class="glass px-8 py-4 rounded-2xl text-center border-l-4 border-l-[#00f2ff]">
                <span class="text-4xl font-black text-white" id="car-counter">0</span>
                <p class="text-[9px] text-slate-500 font-black uppercase">Modelos en Red</p>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-12">
            <div class="lg:col-span-3 space-y-10">
                <div class="relative group">
                    <div class="absolute -inset-1 bg-gradient-to-r from-[#00f2ff] to-[#7000ff] rounded-3xl blur opacity-25 group-hover:opacity-50 transition duration-1000"></div>
                    <div class="relative glass p-2 rounded-3xl">
                        <input type="text" id="search" list="cars-datalist" oninput="handleSearch()" 
                               placeholder="Buscar por marca o modelo (Ej: BMW M4, Hilux, Porsche...)" 
                               class="w-full bg-slate-900/40 border-none p-6 rounded-2xl text-2xl font-bold focus:outline-none text-white">
                    </div>
                    <datalist id="cars-datalist"></datalist>
                </div>

                <div id="catalog" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-8">
                    </div>
            </div>

            <div class="lg:col-span-1">
                <div class="glass p-8 rounded-[2.5rem] sticky top-10 shadow-2xl overflow-hidden">
                    <div class="absolute top-0 left-0 w-full h-1 bg-[#00f2ff]"></div>
                    <h2 class="text-2xl font-black mb-8 italic">CALCULADORA</h2>
                    
                    <div id="preview-box" class="hidden mb-8 rounded-2xl overflow-hidden border border-slate-800 shadow-inner">
                        <img id="calc-img" src="" class="w-full h-44 object-cover">
                    </div>

                    <div class="space-y-6">
                        <input type="text" id="calc-name" readonly class="w-full bg-transparent text-xl font-black text-[#00f2ff] outline-none" placeholder="Seleccioná un auto">
                        
                        <div class="space-y-4">
                            <div>
                                <label class="text-[9px] text-slate-500 font-black uppercase tracking-widest">Patente Anual (UYU)</label>
                                <input type="number" id="calc-t" class="w-full bg-slate-900/50 p-4 rounded-xl border border-slate-800 focus:border-[#00f2ff] outline-none mt-1 font-bold">
                            </div>
                            <div>
                                <label class="text-[9px] text-slate-500 font-black uppercase tracking-widest">Seguro Total (UYU)</label>
                                <input type="number" id="calc-s" class="w-full bg-slate-900/50 p-4 rounded-xl border border-slate-800 focus:border-[#00f2ff] outline-none mt-1 font-bold">
                            </div>
                        </div>

                        <button onclick="calculate()" class="w-full bg-[#00f2ff] hover:bg-white text-black font-black py-5 rounded-2xl transition-all shadow-lg shadow-[#00f2ff]/20 uppercase tracking-tighter">Obtener Mensualidad</button>
                        
                        <div id="result" class="hidden p-6 bg-[#00f2ff]/5 border border-[#00f2ff]/20 rounded-2xl animate-pulse">
                            <p class="text-[9px] font-black text-[#00f2ff] uppercase mb-1">Costo Estimado / Mes</p>
                            <span id="total-val" class="text-4xl font-black text-white"></span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
