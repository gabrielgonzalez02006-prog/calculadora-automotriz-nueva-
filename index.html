<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoUY | Catálogo Automotriz Profesional Uruguay</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #06b6d4; --bg: #ffffff; --card-bg: #f8fafc; --text: #0f172a; --border: #e2e8f0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); scroll-behavior: smooth; }
        
        /* Efecto de Movimiento Pro (Light Mode) */
        .car-card { 
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1); 
            border: 1px solid var(--border);
            background: var(--card-bg);
        }
        .car-card:hover { 
            transform: translateY(-8px) scale(1.01); 
            border-color: var(--accent);
            background: #ffffff;
            box-shadow: 0 20px 30px -10px rgba(6, 182, 212, 0.1);
        }
        .car-card img { transition: transform 0.6s ease; }
        .car-card:hover img { transform: scale(1.08) rotate(-0.5deg); }

        /* Estética Minimalista Light */
        .search-shadow { box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.02), 0 4px 6px -4px rgba(0, 0, 0, 0.01); }
        
        input::-webkit-calendar-picker-indicator { opacity: 0.3; }
        
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-grid { animation: slideUp 0.5s ease-out forwards; }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-7xl mx-auto">
        <header class="mb-14 flex flex-col md:flex-row justify-between items-center border-b border-slate-200 pb-8">
            <div class="text-center md:text-left">
                <h1 class="text-7xl font-black tracking-tighter text-slate-950">Auto<span class="text-[#06b6d4]">UY</span></h1>
                <p class="text-slate-500 font-bold tracking-[0.2em] uppercase text-[9px] mt-1.5">Inteligencia Automotriz • Uruguay</p>
            </div>
            <div class="mt-6 md:mt-0 flex gap-8 items-center bg-slate-100 p-4 rounded-full border border-slate-200 search-shadow">
                <div class="text-center">
                    <span class="text-4xl font-black text-slate-950 block" id="counter">0</span>
                    <p class="text-[8px] text-cyan-600 font-black uppercase">Modelos Verificados</p>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-10">
            <div class="lg:col-span-3 space-y-10">
                <div class="relative group">
                    <div class="absolute -inset-1 bg-cyan-100 rounded-[1.5rem] blur opacity-30 group-hover:opacity-60 transition duration-500"></div>
                    <div class="relative bg-white p-1 rounded-[1.5rem] border border-slate-200 search-shadow">
                        <input type="text" id="search" list="cars-datalist" oninput="handleSearch()" 
                               placeholder="¿Qué modelo buscás? (Ej: Onix, Hilux, VW Gol...)" 
                               class="w-full bg-transparent border-none p-5 text-xl font-bold focus:outline-none text-slate-950 placeholder:text-slate-400">
                    </div>
                    <datalist id="cars-datalist"></datalist>
                </div>

                <div id="catalog" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6 animate-grid">
                    </div>
            </div>

            <div class="lg:col-span-1">
                <div class="bg-white p-8 rounded-[2.5rem] sticky top-10 border border-slate-100 shadow-xl shadow-slate-100/50">
                    <div class="flex items-center gap-2.5 mb-8">
                        <div class="w-1.5 h-7 bg-[#06b6d4] rounded-full"></div>
                        <h2 class="text-xl font-bold uppercase tracking-tight text-slate-950">Calculadora de Costes</h2>
                    </div>
                    
                    <div id="preview-box" class="hidden mb-8 rounded-3xl overflow-hidden border border-slate-200 shadow-inner">
                        <img id="calc-img" src="" class="w-full h-44 object-cover" onerror="this.src='https://images.unsplash.com/photo-1549317661-bd32c8ce0db2?w=800'">
                    </div>

                    <div class="space-y-5">
                        <input type="text" id="calc-name" readonly class="w-full bg-transparent text-xl font-extrabold text-[#06b6d4] outline-none" placeholder="Seleccioná un vehículo">
                        
                        <div class="space-y-4">
                            <div class="bg-slate-50 p-4 rounded-xl border border-slate-100">
                                <label class="text-[8px] text-slate-400 font-bold uppercase tracking-widest">Patente Anual (Est.)</label>
                                <input type="number" id="calc-t" class="w-full bg-transparent text-lg font-bold outline-none mt-1 text-slate-950" placeholder="0">
                            </div>
                            <div class="bg-slate-50 p-4 rounded-xl border border-slate-100">
                                <label class="text-[8px] text-slate-400 font-bold uppercase tracking-widest">Seguro Total (Est.)</label>
                                <input type="number" id="calc-s" class="w-full bg-transparent text-lg font-bold outline-none mt-1 text-slate-950" placeholder="0">
                            </div>
                        </div>

                        <button onclick="calculate()" class="w-full bg-[#06b6d4] hover:bg-slate-950 text-white font-bold py-5 rounded-2xl transition-all transform active:scale-95 shadow-lg shadow-cyan-200/50 uppercase tracking-tight text-sm">CALCULAR MENSUALIDAD</button>
                        
                        <div id="result" class="hidden p-6 bg-cyan-50 border border-cyan-100 rounded-3xl mt-4">
                            <p class="text-[9px] font-bold text-cyan-700 uppercase mb-1">Total Estimado / Mes</p>
                            <span id="total-val" class="text-3xl font-extrabold text-slate-950"></span>
                            <p class="text-[8px] text-slate-500 mt-1.5 font-medium italic">*Incluye nafta (1000km/mes)</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
